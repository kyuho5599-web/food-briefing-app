<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Food Briefing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f8f8f6;color:#1a1a1a}
.app{max-width:720px;margin:0 auto;padding:2rem 1.5rem}
.badge{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
h1{font-size:20px;font-weight:700;margin-bottom:1.5rem}
.tabs{display:flex;border-bottom:1px solid #e0e0e0;margin-bottom:1.5rem}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;margin-bottom:8px}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
input[type=email]{width:100%;font-size:14px;padding:8px 12px;border:1px solid #d0d0d0;border-radius:8px;outline:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f3;border:1px solid #e8e8e8;border-radius:8px;cursor:pointer;font-size:13px;color:#666;user-select:none}
.chip.on{background:#EBF4FF;border-color:#93C5F8;color:#1a6bb5}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
hr{border:none;border-top:1px solid #e8e8e8;margin:1rem 0}
.btn{width:100%;padding:11px;font-size:14px;font-weight:500;background:#fff;border:1px solid #ccc;border-radius:8px;color:#1a1a1a;cursor:pointer}
.btn:hover{background:#f5f5f3}
.hint{font-size:12px;color:#aaa;text-align:center;margin-top:6px}
.preview{border:1px solid #e8e8e8;border-radius:8px;padding:14px;margin-top:1rem;display:none}
.ptitle{font-size:15px;font-weight:600;margin-bottom:12px}
.sec{margin-bottom:14px}
.sec-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sname{font-size:13px;font-weight:600}
.item{padding:8px 0;border-bottom:1px solid #f0f0f0}
.item:last-child{border-bottom:none}
.ititle{font-size:13px;font-weight:600;margin-bottom:3px}
.ibody{font-size:12px;color:#555;line-height:1.65}
.ilink{font-size:11px;color:#378ADD;text-decoration:none;display:inline-block;margin-top:3px}
.ibox{background:#f5f5f3;border-left:3px solid #1a1a1a;padding:12px 14px;margin-top:12px;border-radius:0 8px 8px 0}
.ilbl{font-size:11px;font-weight:600;color:#888;margin-bottom:4px}
.itxt{font-size:12px;line-height:1.7}
.bbtn{background:#EBF4FF;border-color:#93C5F8;color:#1a6bb5;margin-top:8px}
.empty{text-align:center;padding:2rem;font-size:13px;color:#aaa}
.hi{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.hdate{font-size:14px;font-weight:600}
.hmeta{font-size:12px;color:#888;margin-top:2px}
.harr{font-size:18px;color:#ccc}
.back{font-size:13px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem}
</style>
</head>
<body>
<div class="app">
  <div class="badge">Woowa Brothers B2B Sales Team</div>
  <h1>Daily Food Industry Briefing</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('gen')">Create Briefing</button>
    <button class="tab" onclick="showTab('hist')">Saved Briefings</button>
  </div>
  <div id="tab-gen">
    <div class="lbl">Recipient Email</div>
    <div class="card"><input type="email" id="email" placeholder="your@email.com" value="kyuho5599@gmail.com"/></div>
    <div class="lbl">Categories</div>
    <div class="card"><div class="grid2">
      <div class="chip on" data-k="baedal" onclick="toggleChip(this)"><div class="cdot" style="background:#378ADD"></div>Baemin</div>
      <div class="chip on" data-k="rival" onclick="toggleChip(this)"><div class="cdot" style="background:#EF9F27"></div>Rival Apps</div>
      <div class="chip on" data-k="chicken" onclick="toggleChip(this)"><div class="cdot" style="background:#E24B4A"></div>Chicken</div>
      <div class="chip on" data-k="pizza" onclick="toggleChip(this)"><div class="cdot" style="background:#639922"></div>Pizza</div>
      <div class="chip on" data-k="coffee" onclick="toggleChip(this)"><div class="cdot" style="background:#3C3489"></div>Cafe</div>
      <div class="chip on" data-k="trend" onclick="toggleChip(this)"><div class="cdot" style="background:#0F6E56"></div>Trends</div>
    </div></div>
    <hr>
    <button class="btn" onclick="generate()">Generate Briefing</button>
    <p class="hint">Click to load today's briefing</p>
    <div class="preview" id="preview">
      <div class="ptitle" id="ptitle"></div>
      <div id="pcontent"></div>
      <button class="btn bbtn" onclick="sendMail()">Send via Gmail</button>
    </div>
  </div>
  <div id="tab-hist" style="display:none">
    <div id="histList"></div>
    <div id="histDetail" style="display:none"></div>
  </div>
</div>
<script>
var CATS = {
  baedal: {label:"Baemin", color:"#378ADD"},
  rival:  {label:"Rival Apps", color:"#EF9F27"},
  chicken:{label:"Chicken Brands", color:"#E24B4A"},
  pizza:  {label:"Pizza Brands", color:"#639922"},
  coffee: {label:"Cafe/Drinks", color:"#3C3489"},
  trend:  {label:"Food Industry Trends", color:"#0F6E56"}
};
var TODAY = {
  date: "2026-03-17",
  dateLabel: "2026-03-17 (Tue)",
  sections: [
    {key:"baedal", items:[
      {title:"Baemin Festa 100-won deal (3/2~3/29)", body:"90 brands participating. Tiered commission: top 7.8%, mid 6.8%, low 2.0%.", link:"https://www.foodbank.co.kr/news/articleView.html?idxno=67253", ll:"foodbank.co.kr"},
      {title:"Baemin announces 2026 food trends", body:"5 keywords: health-conscious, gourmet everyday, single-serve, seafood, K-food experience.", link:"https://www.foodbank.co.kr/news/articleView.html?idxno=67253", ll:"foodbank.co.kr"}
    ]},
    {key:"rival", items:[
      {title:"Coupang Eats tops Seoul market share", body:"25-27% nationwide, #2. Outpacing Baemin in key Seoul areas via Wow membership free delivery.", link:"https://blog.hansungshowcase.kr/92279", ll:"hansungshowcase.kr"},
      {title:"Yogiyo restructuring, partnering with Naver", body:"3rd place, undergoing layoffs. YogipassX + Naver Plus membership integration for retention.", link:"https://www.newsworks.co.kr/news/articleView.html?idxno=764238", ll:"newsworks.co.kr"}
    ]},
    {key:"chicken", items:[
      {title:"Mar brand reputation: BBQ #1, BHC #2, Kyochon #3", body:"12M+ data points. BBQ 92% positive. Overall chicken data volume down 5.79% MoM.", link:"https://www.energy-news.co.kr/news/articleView.html?idxno=223582", ll:"energy-news.co.kr"},
      {title:"Single-serve chicken series competition heats up", body:"All major brands expanding 1-person portions. Baemin fee waiver under 10K KRW boosts demand.", link:"", ll:""}
    ]},
    {key:"pizza", items:[
      {title:"Dominos, Pizza Hut expand single-serve pizza", body:"Pizza brands lowering entry barrier for solo households with individual-size options.", link:"", ll:""},
      {title:"Global pizza market: $339B in 2026", body:"CAGR 11.52% through 2035. Health options (vegan, whole wheat, gluten-free) driving growth.", link:"", ll:""}
    ]},
    {key:"coffee", items:[
      {title:"Year-round iced drinks trend takes hold", body:"Mega Coffee, Compose, Ediya: iced Americano delivery up 80% in 5 years even in January.", link:"https://www.klnews.co.kr/news/articleView.html?idxno=316057", ll:"klnews.co.kr"},
      {title:"Cafe market polarizing in recession", body:"Budget cafes gain share on value; Starbucks differentiates on experience marketing.", link:"", ll:""}
    ]},
    {key:"trend", items:[
      {title:"2026 food industry keyword: Quiet Movement", body:"KFIRI report: cautious change in recession. 75% of delivery orders include add-ons.", link:"https://www.foodbank.co.kr/news/articleView.html?idxno=67010", ll:"foodbank.co.kr"},
      {title:"Delivery to reach 37% of dining market by 2029", body:"Euromonitor: currently 35%. Takeout projected at 24%. Single households and inflation are key drivers.", link:"https://economist.co.kr/article/view/ecn202507090014", ll:"economist.co.kr"}
    ]}
  ],
  insight: "Delivery market shifting from platform lock-in to targeting single-person households. Recommend pitching brands on single-serve menu promotion as the core Baemin ad strategy."
};
var active = new Set(["baedal","rival","chicken","pizza","coffee","trend"]);
var cur = null;
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ld(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lk(p){try{return Object.keys(localStorage).filter(function(k){return k.indexOf(p)===0;});}catch(e){return[];}}
function showTab(t){
  document.querySelectorAll(".tab").forEach(function(el,i){el.classList.toggle("active",(t==="gen"&&i===0)||(t==="hist"&&i===1));});
  document.getElementById("tab-gen").style.display=t==="gen"?"":"none";
  document.getElementById("tab-hist").style.display=t==="hist"?"":"none";
  if(t==="hist")loadHist();
}
function toggleChip(el){
  var k=el.dataset.k;
  if(active.has(k)){if(active.size<=1)return;active.delete(k);el.classList.remove("on");}
  else{active.add(k);el.classList.add("on");}
}
function render(data){
  document.getElementById("ptitle").textContent="[Daily Food Briefing] "+data.dateLabel;
  var h="";
  data.sections.filter(function(s){return active.has(s.key);}).forEach(function(s){
    h+='<div class="sec"><div class="sec-hd"><div class="sdot" style="background:'+CATS[s.key].color+'"></div><div class="sname">'+CATS[s.key].label+'</div></div>';
    s.items.forEach(function(it){
      h+='<div class="item"><div class="ititle">'+it.title+'</div><div class="ibody">'+it.body+'</div>';
      if(it.link)h+='<a class="ilink" href="'+it.link+'" target="_blank">'+it.ll+'</a>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div class="ibox"><div class="ilbl">Today's Insight</div><div class="itxt">'+data.insight+'</div></div>';
  document.getElementById("pcontent").innerHTML=h;
  document.getElementById("preview").style.display="block";
}
function generate(){sv("briefing:"+TODAY.date,TODAY);cur=TODAY;render(TODAY);}
function sendMail(){
  if(!cur)return;
  var email=document.getElementById("email").value.trim();
  alert("Ready to send to: "+email+"\nSubject: [Daily Food Briefing] "+cur.dateLabel);
}
function loadHist(){
  var el=document.getElementById("histList");
  document.getElementById("histDetail").style.display="none";
  el.style.display="";
  var keys=lk("briefing:").sort(function(a,b){return b.localeCompare(a);});
  if(!keys.length){el.innerHTML='<div class="empty">No saved briefings yet.</div>';return;}
  el.innerHTML=keys.map(function(k){
    var d=ld(k);
    if(!d)return "";
    return '<div class="hi" onclick="showDetail(\''+k+'\')">'+
      '<div><div class="hdate">'+d.dateLabel+'</div>'+
      '<div class="hmeta">'+d.sections.length+' categories</div></div>'+
      '<div class="harr">&#8250;</div></div>';
  }).join("");
}
function showDetail(key){
  var data=ld(key);if(!data)return;cur=data;
  var h='<button class="back" onclick="backToList()">&#8592; Back</button>';
  h+='<div style="font-size:15px;font-weight:700;margin-bottom:12px">[Daily Food Briefing] '+data.dateLabel+'</div>';
  data.sections.forEach(function(s){
    h+='<div class="sec"><div class="sec-hd"><div class="sdot" style="background:'+CATS[s.key].color+'"></div><div class="sname">'+CATS[s.key].label+'</div></div>';
    s.items.forEach(function(it){
      h+='<div class="item"><div class="ititle">'+it.title+'</div><div class="ibody">'+it.body+'</div>';
      if(it.link)h+='<a class="ilink" href="'+it.link+'" target="_blank">'+it.ll+'</a>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div class="ibox"><div class="ilbl">Insight</div><div class="itxt">'+data.insight+'</div></div>';
  h+='<button class="btn bbtn" style="margin-top:12px" onclick="sendMail()">Send via Gmail</button>';
  document.getElementById("histDetail").innerHTML=h;
  document.getElementById("histList").style.display="none";
  document.getElementById("histDetail").style.display="";
}
function backToList(){
  document.getElementById("histDetail").style.display="none";
  document.getElementById("histList").style.display="";
  loadHist();
}
sv("briefing:2026-03-17",TODAY);
</script>
</body>
</html>
