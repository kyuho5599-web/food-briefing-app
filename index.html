<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외식업 일일 동향 브리핑</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f8f8f6;color:#1a1a1a;}
.app{max-width:720px;margin:0 auto;padding:2rem 1.5rem;}
.badge{font-size:12px;font-weight:600;color:#888;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px;}
h1{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:1.5rem;}
.tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0;}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;}
.lbl{font-size:11px;font-weight:600;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
input[type=email]{width:100%;font-size:14px;padding:8px 12px;border:1px solid #d0d0d0;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.chip{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f5f5f3;border:1px solid #e8e8e8;border-radius:8px;cursor:pointer;font-size:13px;color:#666;user-select:none;}
.chip.on{background:#EBF4FF;border-color:#93C5F8;color:#1a6bb5;}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
hr{border:none;border-top:1px solid #e8e8e8;margin:1rem 0;}
.btn{width:100%;padding:11px;font-size:14px;font-weight:500;background:#fff;border:1px solid #ccc;border-radius:8px;color:#1a1a1a;cursor:pointer;}
.btn:hover{background:#f5f5f3;}
.hint{font-size:12px;color:#aaa;text-align:center;margin-top:6px;}
.preview{border:1px solid #e8e8e8;border-radius:8px;padding:14px;margin-top:1rem;display:none;}
.ptitle{font-size:15px;font-weight:600;margin-bottom:12px;}
.sec{margin-bottom:14px;}
.sec-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-name{font-size:13px;font-weight:600;}
.item{padding:8px 0;border-bottom:1px solid #f0f0f0;}
.item:last-child{border-bottom:none;}
.it-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.it-body{font-size:12px;color:#555;line-height:1.65;}
.it-link{font-size:11px;color:#378ADD;text-decoration:none;display:inline-block;margin-top:3px;}
.ibox{background:#f5f5f3;border-left:3px solid #1a1a1a;padding:12px 14px;margin-top:12px;border-radius:0 8px 8px 0;}
.ilbl{font-size:11px;font-weight:600;color:#888;margin-bottom:4px;}
.itxt{font-size:12px;line-height:1.7;}
.btn-blue{background:#EBF4FF;border-color:#93C5F8;color:#1a6bb5;margin-top:8px;}
.empty{text-align:center;padding:2rem;font-size:13px;color:#aaa;}
.hi{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.hdate{font-size:14px;font-weight:600;}
.hmeta{font-size:12px;color:#888;margin-top:2px;}
.harr{font-size:18px;color:#ccc;}
.back{font-size:13px;color:#888;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem;}
</style>
</head>
<body>
<div class="app">
  <div class="badge">우아한형제들 B2B 영업팀</div>
  <h1>외식업 일일 동향 브리핑</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('gen')">브리핑 생성</button>
    <button class="tab" onclick="showTab('hist')">저장된 브리핑</button>
  </div>
  <div id="tab-gen">
    <div class="lbl">수신 이메일</div>
    <div class="card"><input type="email" id="email" placeholder="your@email.com" value="kyuho5599@gmail.com"/></div>
    <div class="lbl">모니터링 카테고리</div>
    <div class="card">
      <div class="grid2">
        <div class="chip on" data-k="baedal" onclick="toggleChip(this)"><div class="cdot" style="background:#378ADD"></div>배달의민족</div>
        <div class="chip on" data-k="rival" onclick="toggleChip(this)"><div class="cdot" style="background:#EF9F27"></div>경쟁 배달앱</div>
        <div class="chip on" data-k="chicken" onclick="toggleChip(this)"><div class="cdot" style="background:#E24B4A"></div>치킨 브랜드</div>
        <div class="chip on" data-k="pizza" onclick="toggleChip(this)"><div class="cdot" style="background:#639922"></div>피자 브랜드</div>
        <div class="chip on" data-k="coffee" onclick="toggleChip(this)"><div class="cdot" style="background:#3C3489"></div>카페/음료</div>
        <div class="chip on" data-k="trend" onclick="toggleChip(this)"><div class="cdot" style="background:#0F6E56"></div>외식업 트렌드</div>
      </div>
    </div>
    <hr>
    <button class="btn" onclick="generate()">브리핑 생성 ↗</button>
    <p class="hint">버튼을 누르면 오늘 브리핑을 불러옵니다</p>
    <div class="preview" id="preview">
      <div class="ptitle" id="ptitle"></div>
      <div id="pcontent"></div>
      <button class="btn btn-blue" onclick="sendMail()">Gmail로 발송하기 ↗</button>
    </div>
  </div>
  <div id="tab-hist" style="display:none">
    <div id="histList"></div>
    <div id="histDetail" style="display:none"></div>
  </div>
</div>
<script>
var CATS={
  baedal:{label:'배달의민족 동향',color:'#378ADD'},
  rival:{label:'경쟁 배달앱 동향',color:'#EF9F27'},
  chicken:{label:'치킨 브랜드 동향',color:'#E24B4A'},
  pizza:{label:'피자 브랜드 동향',color:'#639922'},
  coffee:{label:'카페/음료 동향',color:'#3C3489'},
  trend:{label:'외식업 전체 트렌드',color:'#0F6E56'}
};
var TODAY={
  date:'2026-03-17',
  dateLabel:'2026년 3월 17일 화요일',
  sections:[
    {key:'baedal',items:[
      {title:'배민페스타 100원딜 진행 중 (3/2~3/29)',body:'90개 브랜드 참여, 인기 메뉴 100원 제공. 하루 최대 2,000명 한정. 차등 수수료제(상위 7.8%/중위 6.8%/하위 2.0%) 도입.',link:'https://www.foodbank.co.kr/news/articleView.html?idxno=67253',ll:'식품외식경제'},
      {title:'배민 2026 외식트렌드 5가지 발표',body:'자기만족 건강식, 미식 일상화, 한그릇 오리지널리티, 수산물의 재발견, 경험하는 K-푸드. 1인가구 836만 시대 반영.',link:'https://www.foodbank.co.kr/news/articleView.html?idxno=67253',ll:'식품외식경제'}
    ]},
    {key:'rival',items:[
      {title:'쿠팡이츠 서울 일부 지역 점유율 1위',body:'2026년 1월 기준 전국 점유율 25~27%로 단독 2위. 서울 주요 지역에서 배민 추월. 와우멤버십 무료배달 전략 주효.',link:'https://blog.hansungshowcase.kr/92279',ll:'관련 분석'},
      {title:'요기요 희망퇴직 및 네이버 제휴로 반격',body:'3위로 밀린 요기요 내부 구조조정 진행. 요기패스X와 네이버플러스 멤버십 연동으로 충성 고객 유지 전략 강화.',link:'https://www.newsworks.co.kr/news/articleView.html?idxno=764238',ll:'뉴스웍스'}
    ]},
    {key:'chicken',items:[
      {title:'3월 브랜드 평판 BBQ 1위 BHC 2위 교촌 3위',body:'한국기업평판연구소 1,197만 건 빅데이터 분석. BBQ 긍정비율 92%. 전월 대비 치킨 빅데이터량 5.79% 감소.',link:'https://www.energy-news.co.kr/news/articleView.html?idxno=223582',ll:'에너지신문'},
      {title:'주요 치킨 브랜드 1인 싱글 시리즈 경쟁 본격화',body:'1인가구 증가에 맞춰 소포장 1인 메뉴 확대. 배민 1만원 이하 주문 수수료 면제 정책과 맞물려 소량 주문 수요 증가.',link:'',ll:''}
    ]},
    {key:'pizza',items:[
      {title:'도미노 피자헛 1인용 싱글 피자 라인 강화',body:'높은 객단가로 1인가구 접근성 낮았던 피자 업계가 소포장 출시로 진입장벽 낮추는 중.',link:'',ll:''},
      {title:'글로벌 피자 시장 2026년 3387억 달러 전망',body:'2035년까지 CAGR 11.52% 성장 예측. 비건, 통밀, 글루텐프리 등 건강 옵션 중심 확대.',link:'',ll:''}
    ]},
    {key:'coffee',items:[
      {title:'저가 카페 시즌리스 아이스 트렌드 정착',body:'메가커피, 컴포즈, 이디야 등 1월에도 아이스 아메리카노 배달 비중 5년간 80% 증가.',link:'https://www.klnews.co.kr/news/articleView.html?idxno=316057',ll:'관련 기사'},
      {title:'경기 불황 속 카페 양극화 전략',body:'저가 카페는 가성비로 점유율 확대, 스타벅스 등 프리미엄 브랜드는 경험 마케팅 강화.',link:'',ll:''}
    ]},
    {key:'trend',items:[
      {title:'2026 외식업 키워드 정중동',body:'한국외식산업경영연구원 발표. 불황 속 검증된 변화 추구. 배달 4건 중 3건이 옵션 포함.',link:'https://www.foodbank.co.kr/news/articleView.html?idxno=67010',ll:'식품외식경제'},
      {title:'2029년 외식 내 배달 비중 37% 전망',body:'유로모니터 분석. 1인가구 증가와 고물가가 핵심 동인. 테이크아웃도 24%까지 성장 예측.',link:'https://economist.co.kr/article/view/ecn202507090014',ll:'이코노미스트'}
    ]}
  ],
  insight:'배달 시장 핵심 축이 플랫폼 락인 경쟁에서 1인가구 소량 주문 공략으로 이동 중. 브랜드사 협업 제안 시 1인 메뉴 소포장 상품의 배민 광고 노출 전략을 핵심 어젠다로 설정 추천.'
};
var active=new Set(['baedal','rival','chicken','pizza','coffee','trend']);
var cur=null;
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ld(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lk(p){try{return Object.keys(localStorage).filter(function(k){return k.indexOf(p)===0;});}catch(e){return[];}}
function showTab(t){
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',(t==='gen'&&i===0)||(t==='hist'&&i===1));});
  document.getElementById('tab-gen').style.display=t==='gen'?'':'none';
  document.getElementById('tab-hist').style.display=t==='hist'?'':'none';
  if(t==='hist')loadHist();
}
function toggleChip(el){
  var k=el.dataset.k;
  if(active.has(k)){if(active.size<=1)return;active.delete(k);el.classList.remove('on');}
  else{active.add(k);el.classList.add('on');}
}
function render(data){
  document.getElementById('ptitle').textContent='[일일 외식업 동향 브리핑] '+data.dateLabel;
  var h='';
  data.sections.filter(function(s){return active.has(s.key);}).forEach(function(s){
    h+='<div class="sec"><div class="sec-hd"><div class="sdot" style="background:'+CATS[s.key].color+'"></div><div class="sec-name">'+CATS[s.key].label+'</div></div>';
    s.items.forEach(function(it){
      h+='<div class="item"><div class="it-title">'+it.title+'</div><div class="it-body">'+it.body+'</div>';
      if(it.link)h+='<a class="it-link" href="'+it.link+'" target="_blank">→ '+it.ll+'</a>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div class="ibox"><div class="ilbl">오늘의 인사이트</div><div class="itxt">'+data.insight+'</div></div>';
  document.getElementById('pcontent').innerHTML=h;
  document.getElementById('preview').style.display='block';
}
function generate(){
  sv('briefing:'+TODAY.date,TODAY);
  cur=TODAY;
  render(TODAY);
}
function sendMail(){
  if(!cur)return;
  var email=document.getElementById('email').value.trim();
  alert('발송 준비 완료!
수신: '+email+'
제목: [일일 외식업 동향 브리핑] '+cur.dateLabel);
}
function loadHist(){
  var listEl=document.getElementById('histList');
  document.getElementById('histDetail').style.display='none';
  listEl.style.display='';
  var keys=lk('briefing:').sort(function(a,b){return b.localeCompare(a);});
  if(!keys.length){listEl.innerHTML='<div class="empty">저장된 브리핑이 없습니다.<br>브리핑 생성 탭에서 먼저 생성해보세요.</div>';return;}
  listEl.innerHTML=keys.map(function(k){
    var d=ld(k);
    if(!d)return '';
    return '<div class="hi" onclick="showDetail(''+k+'')"><div><div class="hdate">'+d.dateLabel+'</div><div class="hmeta">'+d.sections.length+'개 카테고리</div></div><div class="harr">›</div></div>';
  }).join('');
}
function showDetail(key){
  var data=ld(key);if(!data)return;cur=data;
  var h='<button class="back" onclick="backToList()">← 목록으로</button>';
  h+='<div style="font-size:15px;font-weight:700;margin-bottom:12px">[일일 외식업 동향 브리핑] '+data.dateLabel+'</div>';
  data.sections.forEach(function(s){
    h+='<div class="sec"><div class="sec-hd"><div class="sdot" style="background:'+CATS[s.key].color+'"></div><div class="sec-name">'+CATS[s.key].label+'</div></div>';
    s.items.forEach(function(it){
      h+='<div class="item"><div class="it-title">'+it.title+'</div><div class="it-body">'+it.body+'</div>';
      if(it.link)h+='<a class="it-link" href="'+it.link+'" target="_blank">→ '+it.ll+'</a>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div class="ibox"><div class="ilbl">오늘의 인사이트</div><div class="itxt">'+data.insight+'</div></div>';
  h+='<button class="btn btn-blue" style="margin-top:12px" onclick="sendMail()">Gmail로 발송하기 ↗</button>';
  document.getElementById('histDetail').innerHTML=h;
  document.getElementById('histList').style.display='none';
  document.getElementById('histDetail').style.display='';
}
function backToList(){
  document.getElementById('histDetail').style.display='none';
  document.getElementById('histList').style.display='';
  loadHist();
}
sv('briefing:2026-03-17',TODAY);
</script>
</body>
</html>
